<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise #3 - Photo Gallery</title>
    <style>
    
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
       body {
            background-color: #f8f9fa;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);  
            grid-template-rows: repeat(3, 1fr);
        }
        .grid-item {
            font-size: 50px;
            align-content: center;
            background-color: #ddd;
            color: white;
            text-align: center;
            padding: 20px;
            height: 250px;
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item" style="background-color: aqua;" >1</div>
        <div class="grid-item" style="background-color: lightblue;" >2</div>
        <div class="grid-item" style="background-color: lightgreen;" >3</div>
        <div class="grid-item" style="background-color: lightyellow;" >4</div>
        <div class="grid-item" style="background-color: lightpink;" >5</div>
        <div class="grid-item" style="background-color: lightsalmon;" >6</div>
        <div class="grid-item" style="background-color: lightseagreen;" >7</div>
        <div class="grid-item" style="background-color: lightcoral;" >8</div>
        <div class="grid-item" style="background-color: lightcyan;" >9</div>
        <div class="grid-item" style="background-color: lightgray;" >10</div>
    </div>
</body>
</html>
