<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4 Part 3</title>
    <style>
.first.block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: black;
            padding: 20px;
            height: 70vh;
            width: 50%;
            margin: 0 auto;
            background-color: hsla(240, 100%, 50%, 0.7);
            border-radius: 15px;
        }
        h1{
            font-size: 36px;
            font-weight: bold;
            font-family: sans-serif;
            color: rgb(255, 255, 255);
        }
        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        input[type="text"],
        input[type="email"],
        textarea {
            width: 70%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #0800fb;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 10%;
            font-size: 10px;
            margin-left: -500px;

        }
    </style>
</head>
<body>
    <div class="first block">
        <h1>Contact Us </h1>
        <form action="#" method="post">
        <input type="text" placeholder="Name">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="tel:xxxx-xxx-xxxx">
        <textarea placeholder="Your Message here...." rows="5"></textarea>
<form>
    <button type="submit">Send</button>
    </div>
   
</body>
</html>
